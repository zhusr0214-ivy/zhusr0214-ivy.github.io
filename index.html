<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirui Zhu | Ivy</title>
    <style>
       /* 全局背景：建议用一个淡淡的渐变，或者一张高斯模糊的建筑摄影图 */
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* 极简淡蓝渐变 */
            display: flex;
            min-height: 100vh;
            color: #2d3436;
        }

        /* 侧边栏：磨砂效果 */
        .sidebar {
            width: 300px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4); /* 半透明白 */
            backdrop-filter: blur(10px); /* 核心：磨砂模糊 */
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 右侧网格容器 */
        .main-content {
            flex: 1;
            padding: 60px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            align-content: center;
        }

        /* 磨砂卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.2); /* 极低透明度 */
            backdrop-filter: blur(15px); /* 更深层的模糊 */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); /* 亮边框模拟玻璃边缘 */
            border-radius: 20px; /* 圆角增加高级感 */
            padding: 40px;
            text-align: center;
            text-decoration: none;
            color: #2d3436;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); /* 柔和阴影 */
        }

        /* 悬停时的交互：更亮、轻微放大 */
        .card:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-8px);
            border-color: rgba(173, 216, 230, 0.8); /* 淡淡的蓝色边缘 */
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
        }

        .card h2 {
            font-size: 3rem;
            margin: 0;
            font-weight: 300;
            color: #ADD8E6; /* 你最爱的淡蓝色 */
            opacity: 0.8;
        }

        .card span {
            display: block;
            margin-top: 15px;
            font-size: 0.9rem;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            font-weight: 500;
            color: #636e72;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1>Sirui Zhu</h1>
        <p>Ivy Zhu<br>SYSU | Information Management</p>
        <p>Focusing on AI Automation, RAG, and Architectural Photography.</p>
    </aside>

    <main class="main-content">
        <a href="#" class="card">
            <h2>1</h2>
            <span>Photography</span>
        </a>
        <a href="#" class="card">
            <h2>2</h2>
            <span>AI Projects</span>
        </a>
        <a href="#" class="card">
            <h2>3</h2>
            <span>Academic</span>
        </a>
        <a href="#" class="card">
            <h2>4</h2>
            <span>About</span>
        </a>
    </main>

</body>
</html>
