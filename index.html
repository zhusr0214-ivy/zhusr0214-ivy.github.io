<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirui Zhu | Ivy</title>
    <style>
        /* 基础设置：符合你喜欢的干净、白蓝审美 */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            min-height: 100vh;
        }

        /* 左侧固定分栏：个人信息 */
        .sidebar {
            width: 300px;
            padding: 40px;
            border-right: 1px solid #f0f0f0;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .sidebar p {
            color: #666;
            line-height: 1.6;
            font-size: 14px;
        }

        /* 右侧内容区：1234 模块 */
        .main-content {
            flex: 1;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2x2 网格 */
            gap: 20px;
        }

        /* 模块样式 */
        .card {
            border: 1px solid #e0e0e0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        /* 悬停效果：淡淡的蓝色 */
        .card:hover {
            border-color: #ADD8E6;
            background-color: #f0f8ff;
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 40px;
            margin: 0;
            color: #ADD8E6; /* 你喜欢的浅蓝色 */
        }

        .card span {
            margin-top: 10px;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
            .main-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1>Sirui Zhu</h1>
        <p>Ivy Zhu<br>SYSU | Information Management</p>
        <p>Focusing on AI Automation, RAG, and Architectural Photography.</p>
    </aside>

    <main class="main-content">
        <a href="#" class="card">
            <h2>1</h2>
            <span>Photography</span>
        </a>
        <a href="#" class="card">
            <h2>2</h2>
            <span>AI Projects</span>
        </a>
        <a href="#" class="card">
            <h2>3</h2>
            <span>Academic</span>
        </a>
        <a href="#" class="card">
            <h2>4</h2>
            <span>About</span>
        </a>
    </main>

</body>
</html>
